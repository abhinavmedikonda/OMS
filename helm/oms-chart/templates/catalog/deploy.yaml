apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: catalog-{{ .Values.env }}
  labels:
    app: api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      initContainers:
      - name: create-index
        image: curlimages/curl:latest
        command: 
        - sh
        - -c
        - |
          curl -X PUT http://db.catalog-{{ .Values.env }}:9200/catalog -H 'Content-Type: application/json' -d '{
            "mappings": {
              "product": {
                "properties": {
                  "name": {"type": "text"},
                  "description": {"type": "text"},
                  "price": {"type": "float"}
                }
              }
            }
          }' || true
      containers:
      - name: api
        image: abhinavmedikonda/oms-catalog-api:{{ .Values.image.tag }}
        ports:
        - containerPort: 8080
        env:
        - name: DATABASE_URL
          value: "http://db.catalog-{{ .Values.env }}:9200"
        - name: OTEL_EXPORTER_OTLP_ENDPOINT
          value: "{{ .Values.otel.exporter.endpoint }}"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: db
  namespace: catalog-{{ .Values.env }}
  labels:
    app: db
spec:
  replicas: 1
  selector:
    matchLabels:
      app: db
  template:
    metadata:
      labels:
        app: db
    spec:
      containers:
      - name: db
        image: docker.elastic.co/elasticsearch/elasticsearch:6.2.4
        ports:
        - containerPort: 9200
        env:
        - name: ES_JAVA_OPTS
          value: "-Xms1g -Xmx1g"
        - name: discovery.type
          value: "single-node"
        - name: network.host
          value: 0.0.0.0
