apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: catalog-{{ .Values.env }}
  labels:
    app: api
spec:
  selector:
    app: api
  type: ClusterIP
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: db
  namespace: catalog-{{ .Values.env }}
  labels:
    app: db
spec:
  selector:
    app: db
  type: ClusterIP
  ports:
    - protocol: TCP
      port: 9200
      targetPort: 9200
