apiVersion: v1
kind: Service
metadata:
  name: catalog{{ .Values.env_hyp }}
  labels:
    app: catalog{{ .Values.env_hyp }}
spec:
  selector:
    app: catalog{{ .Values.env_hyp }}
  type: ClusterIP
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: catalog-db{{ .Values.env_hyp }}
  labels:
    app: catalog-db{{ .Values.env_hyp }}
spec:
  selector:
    app: catalog-db{{ .Values.env_hyp }}
  type: ClusterIP
  ports:
    - protocol: TCP
      port: 9200
      targetPort: 9200
