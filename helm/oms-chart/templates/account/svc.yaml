apiVersion: v1
kind: Service
metadata:
  name: account{{ .Values.env_hyp }}
  labels:
    app: account{{ .Values.env_hyp }}
spec:
  selector:
    app: account{{ .Values.env_hyp }}
  type: ClusterIP
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: account-db{{ .Values.env_hyp }}
  labels:
    app: account-db{{ .Values.env_hyp }}
spec:
  selector:
    app: account-db{{ .Values.env_hyp }}
  type: ClusterIP
  ports:
    - protocol: TCP
      port: 5432
      targetPort: 5432
