apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: account-{{ .Values.env }}
  labels:
    app: api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
      - name: api
        image: abhinavmedikonda/oms-account-api:{{ .Values.image.tag }}
        ports:
        - containerPort: 8080
        env:
        - name: DATABASE_URL
          value: "postgres://abhi:1234@db.account-{{ .Values.env }}:5432/account_db_{{ .Values.env }}?sslmode=disable"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: db
  namespace: account-{{ .Values.env }}
  labels:
    app: db
spec:
  replicas: 1
  selector:
    matchLabels:
      app: db
  template:
    metadata:
      labels:
        app: db
    spec:
      containers:
      - name: db
        image: abhinavmedikonda/oms-account-db:v1
        ports:
        - containerPort: 5432
        env:
        - name: POSTGRES_DB
          value: "account_db_{{ .Values.env }}"
        - name: POSTGRES_USER
          value: "abhi"
        - name: POSTGRES_PASSWORD
          value: "1234"
