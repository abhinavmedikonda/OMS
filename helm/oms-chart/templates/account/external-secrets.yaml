apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: vault
  namespace: account-{{ .Values.env }}
spec:
  refreshInterval: "1m"
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: vault
  dataFrom:
  - extract:
      key: account-{{ .Values.env }}
