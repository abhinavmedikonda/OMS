apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: graphql{{ .Values.env_hyp }}
  labels:
    app: api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
      - name: api
        image: abhinavmedikonda/graphql:{{ .Values.image.tag }}
        ports:
        - containerPort: 8080
        env:
        - name: ACCOUNT_SERVICE_URL
          value: "api.account{{ .Values.env_hyp }}:80"
        - name: CATALOG_SERVICE_URL
          value: "api.catalog{{ .Values.env_hyp }}:80"
        - name: ORDER_SERVICE_URL
          value: "api.order{{ .Values.env_hyp }}:80"
