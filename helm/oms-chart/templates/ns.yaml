metadata:
  name: order
  namespace: order{{ .Values.env_hyp }}
spec:
  mtls:
    mode: STRICT
---
apiVersion: v1
kind: Namespace
metadata:
  name: graphql{{ .Values.env_hyp }}
  labels:
    istio-injection: enabled
---
apiVersion: security.istio.io/v1beta1
