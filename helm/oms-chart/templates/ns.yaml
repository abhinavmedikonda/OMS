  name: catalog{{ .Values.env_hyp }}
  labels:
    istio-injection: enabled
---
apiVersion: security.istio.io/v1beta1
kind: PeerAuthentication
metadata:
  name: catalog
  namespace: catalog{{ .Values.env_hyp }}
spec:
  mtls:
    mode: STRICT
---
apiVersion: v1
kind: Namespace
metadata:
  name: order{{ .Values.env_hyp }}
  labels:
    istio-injection: enabled
---
apiVersion: security.istio.io/v1beta1
