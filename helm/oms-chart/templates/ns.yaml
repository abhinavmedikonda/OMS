apiVersion: v1
kind: Namespace
metadata:
  name: account{{ .Values.env_hyp }}
  labels:
    istio-injection: enabled
---
apiVersion: security.istio.io/v1beta1
kind: PeerAuthentication
metadata:
  name: account
  namespace: account{{ .Values.env_hyp }}
spec:
  mtls:
    mode: STRICT
---
