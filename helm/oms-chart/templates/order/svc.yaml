apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: order{{ .Values.env_hyp }}
  labels:
    app: api
spec:
  selector:
    app: api
  type: ClusterIP
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: db
  namespace: order{{ .Values.env_hyp }}
  labels:
    app: db
spec:
  selector:
    app: db
  type: ClusterIP
  ports:
    - protocol: TCP
      port: 5432
      targetPort: 5432
