apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: order-{{ .Values.env }}
  labels:
    app: api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
      - name: api
        image: abhinavmedikonda/oms-order-api:{{ .Values.image.tag }}
        ports:
        - containerPort: 8080
        env:
        - name: DB_U
          valueFrom:
            secretKeyRef:
              name: vault
              key: db-username
        - name: DB_P
          valueFrom:
            secretKeyRef:
              name: vault
              key: db-password
        - name: DATABASE_URL
          value: "postgres://$(DB_U):$(DB_P)@db.order-{{ .Values.env }}:5432/order_db_{{ .Values.env }}?sslmode=disable"
        - name: ACCOUNT_SERVICE_URL
          value: "api.account-{{ .Values.env }}:80"
        - name: CATALOG_SERVICE_URL
          value: "api.catalog-{{ .Values.env }}:80"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: db
  namespace: order-{{ .Values.env }}
  labels:
    app: db
spec:
  replicas: 1
  selector:
    matchLabels:
      app: db
  template:
    metadata:
      labels:
        app: db
    spec:
      containers:
      - name: db
        image: abhinavmedikonda/oms-order-db:v1
        ports:
        - containerPort: 5432
        env:
        - name: POSTGRES_DB
          value: "order_db_{{ .Values.env }}"
        - name: POSTGRES_USER
          valueFrom:
            secretKeyRef:
              name: vault
              key: db-username
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: vault
              key: db-password
