apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: order{{ .Values.env_hyp }}
  labels:
    app: api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
      - name: api
        image: abhinavmedikonda/order:{{ .Values.image.tag }}
        ports:
        - containerPort: 8080
        env:
        - name: DATABASE_URL
          value: "postgres://abhi:1234@db.order{{ .Values.env_hyp }}:5432/order_db{{ .Values.env_und }}?sslmode=disable"
        - name: ACCOUNT_SERVICE_URL
          value: "api.account{{ .Values.env_hyp }}:80"
        - name: CATALOG_SERVICE_URL
          value: "api.catalog{{ .Values.env_hyp }}:80"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: db
  namespace: order{{ .Values.env_hyp }}
  labels:
    app: db
spec:
  replicas: 1
  selector:
    matchLabels:
      app: db
  template:
    metadata:
      labels:
        app: db
    spec:
      containers:
      - name: db
        image: abhinavmedikonda/order-db:v1
        ports:
        - containerPort: 5432
        env:
        - name: POSTGRES_DB
          value: "order_db{{ .Values.env_und }}"
        - name: POSTGRES_USER
          value: "abhi"
        - name: POSTGRES_PASSWORD
          value: "1234"
