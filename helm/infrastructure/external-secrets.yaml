apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: vault-backend
spec:
  provider:
    vault:
      server: "http://vault.infrastructure.svc.cluster.local:8200"
      path: "kv/oms"
      version: "v2"
      auth:
        tokenSecretRef:
          name: "vault-token"
          namespace: "infrastructure"
          key: "token"
