services:
  graphql:
    build:
      context: .
      dockerfile: ./graphql/app.dockerfile
    ports:
      - 8000:8080
    depends_on:
      - account
      - catalog
    environment:
      ACCOUNT_SERVICE_URL: account:8080
      CATALOG_SERVICE_URL: catalog:8080
      ORDER_SERVICE_URL: order:8080
    restart: on-failure

  account-db:
    build:
      context: ./account
      dockerfile: ./db.dockerfile
    # ports:
    # - "5432:5432"
    environment:
      POSTGRES_DB: account_db
      POSTGRES_USER: abhi
      POSTGRES_PASSWORD: 1234
    restart: unless-stopped

  account:
    build:
      context: .
      dockerfile: ./account/app.dockerfile
    depends_on:
      - account-db
    environment:
      DATABASE_URL: postgres://abhi:1234@account-db/account_db?sslmode=disable
    restart: on-failure

  catalog:
    build:
      context: .
      dockerfile: ./catalog/app.dockerfile
    depends_on:
      - catalog-db
    environment:
      DATABASE_URL: http://catalog-db:9200
    restart: on-failure

  catalog-db:
    image: docker.elastic.co/elasticsearch/elasticsearch:6.2.4
    # ports:
    # - "9200:9200"
    environment:
      ES_JAVA_OPTS: -Xms1g -Xmx1g
      discovery.type: single-node

  order:
    build:
      context: .
      dockerfile: ./order/app.dockerfile
    depends_on:
      - order-db
    environment:
      DATABASE_URL: postgres://abhi:1234@order-db/order_db?sslmode=disable
      ACCOUNT_SERVICE_URL: account:8080
      CATALOG_SERVICE_URL: catalog:8080
    restart: on-failure

  order-db:
    build:
      context: ./order
      dockerfile: ./db.dockerfile
    # ports:
    # - "5432:5432"
    environment:
      POSTGRES_DB: order_db
      POSTGRES_USER: abhi
      POSTGRES_PASSWORD: 1234
    restart: unless-stopped