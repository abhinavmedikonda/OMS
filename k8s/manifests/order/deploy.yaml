apiVersion: apps/v1
kind: Deployment
metadata:
  name: order
  labels:
    app: order
spec:
  replicas: 2
  selector:
    matchLabels:
      app: order
  template:
    metadata:
      labels:
        app: order
    spec:
      containers:
      - name: order
        image: abhinavmedikonda/order:v1
        ports:
        - containerPort: 8080
        env:
        - name: DATABASE_URL
          value: "postgres://abhi:1234@order-db:5432/order_db?sslmode=disable"
        - name: ACCOUNT_SERVICE_URL
          value: "account:80"
        - name: CATALOG_SERVICE_URL
          value: "catalog:80"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-db
  labels:
    app: order-db
spec:
  replicas: 1
  selector:
    matchLabels:
      app: order-db
  template:
    metadata:
      labels:
        app: order-db
    spec:
      containers:
      - name: order-db
        image: abhinavmedikonda/order-db:v1
        ports:
        - containerPort: 5432
        env:
        - name: POSTGRES_DB
          value: "order_db"
        - name: POSTGRES_USER
          value: "abhi"
        - name: POSTGRES_PASSWORD
          value: "1234"
