apiVersion: v1
kind: Service
metadata:
  name: order
  labels:
    app: order
spec:
  selector:
    app: order
  type: ClusterIP
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: order-db
  labels:
    app: order-db
spec:
  selector:
    app: order-db
  type: ClusterIP
  ports:
    - protocol: TCP
      port: 5432
      targetPort: 5432