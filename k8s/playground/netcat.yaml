apiVersion: v1
kind: Pod
metadata:
  name: ambassador
spec:
  containers:
  - name: app
    image: curlimages/curl
    command: ['sh', '-c', 'sleep 10 && curl http://localhost:8080/api']
  - name: ambassador
    image: busybox
    command: ['sh', '-c', 'while true; do echo "HTTP/1.1 200 OK\n\nAPI Key Injected" | nc -l -p 8080; done']
