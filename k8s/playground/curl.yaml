apiVersion: v1
kind: Pod
metadata:
  name: ambassador
spec:
  containers:
  - name: app
    image: curlimages/curl
    command:
    - sh
    - -c
    - |
      sleep 10
      i=0
      while true; do
        i=$((i+1))
        echo "Request #$i"
        curl "http://localhost:8080/api?count=$i"
        sleep 5
      done
  - name: ambassador
    image: busybox
    command:
    - sh
    - -c
    - |
      while true; do
        printf 'HTTP/1.1 200 OK\r\n\r\nAPI Key Injected\n' | nc -l -p 8080
      done
